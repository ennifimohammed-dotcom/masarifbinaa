android {
    namespace "com.ennifi.construction"
    compileSdk 34

    defaultConfig {
        applicationId "com.ennifi.construction"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.1.0"
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
}
